services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fence
      POSTGRES_PASSWORD: fence
      POSTGRES_DB: fence
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fence"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - fence-net

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    networks:
      - fence-net

volumes:
  postgres_data:

networks:
  fence-net:
    driver: bridge
